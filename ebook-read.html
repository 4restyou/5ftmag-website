  <style>
    body { background: var(--bg); color: var(--text); }
    /* flip 페이지 안의 이미지 — 페이지 영역을 꽉 채움 */
    .wz-reader .wz-page { background: var(--bg-sub); overflow: hidden; }
    .wz-reader .wz-page img { width: 100%; height: 100%; object-fit: contain; display: block; -webkit-user-drag: none; user-drag: none; background: #fff; }
    /* 게이트(로딩/없음) 메시지 */
    .ebook-gate { max-width: 520px; margin: 0 auto; padding: 80px 24px; text-align: center; color: var(--text-muted); }
    .ebook-gate h2 { color: var(--text); font-size: 20px; margin: 0 0 10px; }
    .ebook-gate p { font-size: 14px; line-height: 1.7; margin: 0 0 8px; }
    /* paywall 페이지 (flip 마지막 미리보기 장) */
    .ebook-paywall { width: 100%; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px 28px; background: #fff; color: #111; }
    .ebook-paywall-kicker { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #999; margin: 0 0 12px; }
    .ebook-paywall h3 { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; margin: 0 0 12px; line-height: 1.3; }
    .ebook-paywall-sub { font-size: 13px; line-height: 1.7; color: #555; margin: 0 0 22px; }
    .ebook-paywall-btn { font: inherit; font-size: 14px; font-weight: 700; padding: 12px 22px; border-radius: 999px; border: none; background: #111; color: #fff; cursor: pointer; }
    .ebook-paywall-btn:hover { opacity: 0.88; }
  </style>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#111111">
  <link rel="preconnect" href="https://pucpqsfwqouqohwsvmnd.supabase.co" crossorigin>
</head>
