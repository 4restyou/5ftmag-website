  <style>
    body { background: var(--bg); color: var(--text); }
    .ebook-gate { max-width: 520px; margin: 0 auto; padding: 80px 24px; text-align: center; color: var(--text-muted); }
    .ebook-gate h2 { color: var(--text); font-size: 20px; margin: 0 0 10px; }
    .ebook-gate p { font-size: 14px; line-height: 1.7; margin: 0 0 8px; }
    /* 구매 CTA — 하단 중앙, 안내 한 줄 + 키컬러(노랑) 버튼 */
    .wz-reader-cta-wrap {
      position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
      z-index: 30; display: flex; flex-direction: column; align-items: center; gap: 10px;
      animation: wz-cta-rise .4s ease both;
    }
    .wz-reader-cta-note {
      margin: 0; font-size: 13px; font-weight: 600; color: #fff;
      background: rgba(0,0,0,0.55); padding: 6px 14px; border-radius: 999px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .wz-reader-cta {
      font: inherit; font-size: 15px; font-weight: 800; letter-spacing: -0.01em;
      padding: 15px 32px; border-radius: 999px; border: none;
      background: var(--accent); color: #111; cursor: pointer;
      box-shadow: 0 10px 34px rgba(0,0,0,0.4);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .wz-reader-cta:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 14px 40px rgba(0,0,0,0.45); }
    @keyframes wz-cta-rise { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#111111">
  <link rel="preconnect" href="https://pucpqsfwqouqohwsvmnd.supabase.co" crossorigin>
</head>
