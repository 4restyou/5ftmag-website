  <style>
    body { background: var(--bg); color: var(--text); }
    .ebook-gate { max-width: 520px; margin: 0 auto; padding: 80px 24px; text-align: center; color: var(--text-muted); }
    .ebook-gate h2 { color: var(--text); font-size: 20px; margin: 0 0 10px; }
    .ebook-gate p { font-size: 14px; line-height: 1.7; margin: 0 0 8px; }
    /* 구매 CTA — 하단 중앙, 안내 한 줄 + 키컬러(노랑) 버튼 */
    .wz-reader-cta-wrap {
      position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
      z-index: 30; display: flex; flex-direction: column; align-items: center; gap: 10px;
      animation: wz-cta-rise .4s ease both;
    }
    .wz-reader-cta-note {
      margin: 0; font-size: 13px; font-weight: 600; color: #fff;
      background: rgba(0,0,0,0.55); padding: 6px 14px; border-radius: 999px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .wz-reader-cta {
      font: inherit; font-size: 15px; font-weight: 800; letter-spacing: -0.01em;
      padding: 15px 32px; border-radius: 999px; border: none;
      background: var(--accent); color: #111; cursor: pointer;
      box-shadow: 0 10px 34px rgba(0,0,0,0.4);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .wz-reader-cta:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 14px 40px rgba(0,0,0,0.45); }
    @keyframes wz-cta-rise { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* 결제수단 선택 모달 */
    .ebk-pay-modal-back {
      position: fixed; inset: 0; z-index: 2300; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      padding: 20px; animation: ebk-fade .2s ease both;
    }
    .ebk-pay-modal {
      width: 100%; max-width: 340px; background: var(--bg); color: var(--text);
      border-radius: 18px; padding: 26px 22px 18px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .ebk-pay-modal-title { margin: 0 0 4px; font-size: 18px; }
    .ebk-pay-modal-sub { margin: 0 0 18px; font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .ebk-pay-methods { display: flex; flex-direction: column; gap: 10px; }
    .ebk-pay-method {
      font: inherit; font-size: 15px; font-weight: 700; padding: 14px; border-radius: 12px;
      border: 1px solid var(--line, rgba(0,0,0,0.12)); background: var(--surface, #f5f5f7); color: var(--text);
      cursor: pointer; transition: transform .12s ease, border-color .12s ease;
    }
    .ebk-pay-method:hover:not([disabled]) { transform: translateY(-1px); border-color: var(--accent); }
    .ebk-pay-method[disabled] { opacity: .5; cursor: not-allowed; }
    .ebk-pay-method-link { display: block; text-decoration: none; text-align: center; box-sizing: border-box; }
    .ebk-pay-method-sub { font-weight: 600; font-size: 13.5px; background: none; }
    .ebk-pay-soon { font-size: 11px; font-weight: 600; color: var(--text-muted); }
    .ebk-pay-legal { margin: 14px 0 0; font-size: 11.5px; color: var(--text-muted); line-height: 1.5; }
    .ebk-pay-legal a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }
    .ebk-pay-input {
      width: 100%; box-sizing: border-box; font: inherit; font-size: 15px; padding: 12px 14px;
      border-radius: 10px; border: 1px solid var(--line, rgba(0,0,0,0.15)); background: var(--bg);
      color: var(--text); margin-bottom: 8px; letter-spacing: 0.02em;
    }
    .ebk-pay-redeem-msg { min-height: 18px; margin: 0 0 10px; font-size: 12.5px; color: var(--text-muted); }
    .ebk-pay-cancel {
      margin-top: 14px; font: inherit; font-size: 13px; color: var(--text-muted);
      background: none; border: none; cursor: pointer; padding: 6px;
    }
    /* 처리 중 오버레이 */
    .ebk-pay-overlay {
      position: fixed; inset: 0; z-index: 2400; display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    }
    .ebk-pay-overlay-box { text-align: center; color: #fff; }
    .ebk-pay-overlay-box p { margin: 14px 0 0; font-size: 14px; font-weight: 600; }
    .ebk-pay-spinner {
      display: inline-block; width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; animation: ebk-spin .8s linear infinite;
    }
    @keyframes ebk-spin { to { transform: rotate(360deg); } }
    @keyframes ebk-fade { from { opacity: 0; } to { opacity: 1; } }
  </style>
