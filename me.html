<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>내 정보 — 5ft.mag</title>
  <link rel="icon" type="image/svg+xml" href="img/favicon/icon.svg">
  <script>document.documentElement.dataset.theme=localStorage.getItem('5ftTheme')||'light';</script>
  <link rel="stylesheet" href="pretendard.css" />
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/common.css?v=20260511-imgfix">
  <style>
    body { background: var(--bg); color: var(--text); }

    .me-header { max-width: 1100px; margin: 0 auto; padding: 40px 24px 24px; border-bottom: 1px solid var(--border); }
    .me-back   { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: var(--fw-heading); letter-spacing: 0.04em; color: var(--text-muted); margin-bottom: 24px; transition: color .15s; }
    .me-back:hover { color: var(--text); }
    .me-title-row { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .me-title { font-size: 28px; font-weight: var(--fw-heading); letter-spacing: -0.02em; margin: 0; }
    .me-user  { font-size: 13px; color: var(--text-muted); }
    .me-user button { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; font: inherit; text-decoration: underline; text-underline-offset: 3px; }
    .me-user button:hover { color: var(--text); }

    /* ── 상위 페이지 탭 (사진 / 매물) ── */
    .me-pagetabs {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      gap: 24px;
      border-bottom: 1px solid var(--border);
    }
    .me-pagetab {
      padding: 12px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font: inherit;
      font-size: 15px;
      font-weight: var(--fw-heading);
      letter-spacing: -0.01em;
      color: var(--text-muted);
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .me-pagetab:hover { color: var(--text); }
    .me-pagetab.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── 사진 탭 내 status 칩 ── */
    .me-tabs { max-width: 1100px; margin: 0 auto; padding: 24px 24px 0; display: flex; gap: 4px; border-bottom: 1px solid var(--border); }
    .me-tab  { padding: 10px 16px; background: none; border: none; border-bottom: 2px solid transparent; font-size: 14px; font-weight: var(--fw-heading); color: var(--text-muted); cursor: pointer; letter-spacing: 0.02em; transition: color .15s, border-color .15s; }
    .me-tab:hover { color: var(--text); }
    .me-tab.active { color: var(--text); border-bottom-color: var(--text); }
    .me-tab .count { display: inline-block; background: var(--bg-sub); color: var(--text-muted); font-size: 11px; padding: 1px 7px; border-radius: var(--badge-radius); margin-left: 6px; font-weight: var(--fw-heading); }
    .me-tab.active .count { background: var(--text); color: var(--bg); }

    .me-list { max-width: 1100px; margin: 0 auto; padding: 24px; display: grid; gap: 20px; }

    .me-card { display: grid; grid-template-columns: 220px 1fr; gap: 24px; padding: 20px; background: var(--bg-sub); border-radius: 6px; align-items: start; }
    .me-card-img { width: 220px; aspect-ratio: 1; background: var(--bg); border-radius: 4px; overflow: hidden; cursor: zoom-in; position: relative; }
    .me-card-img img { width: 100%; height: 100%; object-fit: cover; }
    /* storage 가 사라진 orphan — onerror 가 is-missing 클래스를 붙임 */
    .me-card-img.is-missing { cursor: default; background: repeating-linear-gradient(45deg, var(--bg) 0 8px, var(--bg-sub) 8px 16px); }
    .me-card-img.is-missing::after {
      content: '사진 파일이 사라졌습니다 — 삭제 버튼으로 정리해주세요';
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      padding: 12px; text-align: center; font-size: 11px; line-height: 1.5; letter-spacing: 0.04em;
      color: var(--text-muted); font-weight: var(--fw-heading);
    }

    .me-card-meta { display: grid; gap: 10px; font-size: 14px; }
    .me-card-row  { display: grid; grid-template-columns: 90px 1fr; gap: 10px; align-items: baseline; line-height: 1.55; }
    .me-card-row .k { font-size: 11px; font-weight: var(--fw-heading); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
    .me-card-row .v { color: var(--text); word-break: break-word; }
    .me-card-row .v input, .me-card-row .v textarea { width: 100%; font: inherit; padding: 6px 8px; border: 1px solid var(--border); border-radius: 3px; background: var(--bg); color: var(--text); }
    .me-card-row .v textarea { resize: vertical; min-height: 60px; }

    .me-card-status { display: inline-block; font-size: 11px; font-weight: var(--fw-heading); letter-spacing: 0.1em; padding: 2px 8px; border-radius: 2px; text-transform: uppercase; }
    .me-card-status.pending  { background: #fef3c7; color: #78350f; }
    .me-card-status.approved { background: #d1fae5; color: #064e3b; }
    .me-card-status.rejected { background: #fee2e2; color: #7f1d1d; }
    .me-card-status.available { background: #d1fae5; color: #064e3b; }
    .me-card-status.reserved  { background: #fef3c7; color: #78350f; }
    .me-card-status.sold      { background: #e5e7eb; color: #4b5563; }
    .me-card-status.hidden    { background: #fee2e2; color: #7f1d1d; }
    /* 테마 응모 칩 — status 옆에 보조 노출 */
    .me-card-theme { display: inline-block; margin-left: 6px; font-size: 11px; font-weight: var(--fw-heading); letter-spacing: 0.08em; padding: 2px 8px; border-radius: 2px; background: #e0e7ff; color: #3730a3; }

    .me-card-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .me-btn { font: inherit; font-size: 13px; font-weight: var(--fw-heading); letter-spacing: 0.02em; padding: 8px 14px; border-radius: 4px; cursor: pointer; border: none; transition: opacity .15s; text-decoration: none; display: inline-flex; align-items: center; }
    .me-btn:hover { opacity: 0.85; }
    .me-btn:disabled { opacity: 0.4; cursor: progress; }
    .me-btn-primary { background: var(--text); color: var(--bg); }
    .me-btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .me-btn-danger { background: none; color: var(--text-muted); }
    .me-btn-danger:hover { color: #7f1d1d; }

    .me-empty { text-align: center; padding: 80px 24px; color: var(--text-muted); font-size: 14px; }
    .me-empty .me-empty-cta { display: inline-block; margin-top: 16px; color: var(--text); text-decoration: underline; text-underline-offset: 3px; }

    .gate { max-width: 560px; margin: 80px auto; padding: 40px 24px; text-align: center; }
    .gate h2 { font-size: 22px; font-weight: var(--fw-heading); margin: 0 0 12px; }
    .gate p { color: var(--text-muted); line-height: 1.6; margin: 0 0 20px; }
    .gate .gate-btn { background: var(--text); color: var(--bg); border: none; padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: var(--fw-heading); cursor: pointer; }

    .img-zoom { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 9999; cursor: zoom-out; padding: 24px; }
    .img-zoom.open { display: flex; }
    .img-zoom img { max-width: 100%; max-height: 100%; object-fit: contain; }

    /* ── 매물 카드 (me 페이지 전용) ── */
    .me-market-toolbar { max-width: 1100px; margin: 24px auto 0; padding: 0 24px; display: flex; justify-content: flex-end; }
    .me-market-card-title { font-size: 16px; font-weight: var(--fw-heading); letter-spacing: -0.01em; margin: 0; }
    .me-market-card-price { font-size: 15px; font-weight: var(--fw-heading); color: var(--text); }
    .me-market-card-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; flex-wrap: wrap; }

    @media (max-width: 720px) {
      .me-card { grid-template-columns: 1fr; }
      .me-card-img { width: 100%; aspect-ratio: 4/3; }
      .me-card-row { grid-template-columns: 1fr; gap: 2px; }
    }
  </style>
</head>
<body>

<div class="me-header">
  <a href="index.html" class="me-back">← 5ft.mag</a>
  <div class="me-title-row">
    <h1 class="me-title">내 정보</h1>
    <div class="me-user" id="meUser"></div>
  </div>
</div>

<div id="gate" class="gate" hidden>
  <h2>로그인이 필요해요</h2>
  <p>내가 올린 사진과 매물을 보고 관리하려면 로그인해주세요.</p>
  <button class="gate-btn" id="gateLogin">Google로 로그인</button>
</div>

<div id="app" hidden>
  <!-- 상위 페이지 탭 -->
  <div class="me-pagetabs">
    <button type="button" class="me-pagetab active" data-section="photos">사진</button>
    <button type="button" class="me-pagetab" data-section="market">매물</button>
  </div>

  <!-- ─── 사진 섹션 ─── -->
  <section id="section-photos">
    <div class="me-tabs">
      <button type="button" class="me-tab active" data-status="all">전체 <span class="count" id="cnt-all">·</span></button>
      <button type="button" class="me-tab" data-status="pending">대기 <span class="count" id="cnt-pending">·</span></button>
      <button type="button" class="me-tab" data-status="approved">공개 중 <span class="count" id="cnt-approved">·</span></button>
      <button type="button" class="me-tab" data-status="rejected">반려 <span class="count" id="cnt-rejected">·</span></button>
    </div>
    <div class="me-list" id="list">
      <div class="me-empty">불러오는 중…</div>
    </div>
  </section>

  <!-- ─── 매물 섹션 ─── -->
  <section id="section-market" hidden>
    <div class="me-market-toolbar">
      <a href="market.html#new" class="me-btn me-btn-primary">+ 매물 올리기</a>
    </div>
    <div class="me-list" id="marketList">
      <div class="me-empty">불러오는 중…</div>
    </div>
  </section>
</div>

<div class="img-zoom" id="imgZoom"><img id="imgZoomTarget" alt="" /></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./js/db-client.js?v=20260514-authreturn"></script>
<script>
'use strict';

const STATE = {
  user: null,
  section: 'photos',     // 'photos' | 'market'
  // photos
  rows: [],
  filter: 'all',
  // market
  marketRows: [],
};

const CAT_LABELS = { film:'필름', camera:'카메라', lens:'렌즈', accessory:'액세서리', etc:'기타' };

function $(id) { return document.getElementById(id); }
function db() { return window.MagDB; }
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtDateShort(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function statusLabel(s) {
  return ({ pending:'대기', approved:'공개 중', rejected:'반려',
           available:'판매중', reserved:'예약중', sold:'판매완료', hidden:'숨김' })[s] || s;
}
function nextStatusOf(s) {
  return s === 'available' ? 'reserved' : s === 'reserved' ? 'sold' : 'available';
}

async function checkAuth() {
  if (!db() || !db().isReady()) {
    document.body.innerHTML = '<div class="gate"><h2>인증 모듈 로드 실패</h2><p>새로고침해주세요.</p></div>';
    return false;
  }
  const session = await db().auth.getSession();
  if (!session) { showGate(); return false; }
  STATE.user = session.user;
  const profile = await db().profiles.getMine();
  const name = profile?.display_name || STATE.user.email?.split('@')[0] || '사용자';
  $('meUser').innerHTML = `${escapeHtml(name)} · <button id="logout">로그아웃</button>`;
  $('logout').addEventListener('click', async () => {
    await db().auth.signOut();
    location.reload();
  });
  return true;
}

function showGate() {
  $('gate').hidden = false;
  $('app').hidden = true;
  $('gateLogin').addEventListener('click', async () => {
    await db().auth.signInWithGoogle(window.location.href.split('#')[0]);
  });
}

// ═════════════════════════════════════════
// 사진 섹션 (기존)
// ═════════════════════════════════════════
async function loadPhotos() {
  $('list').innerHTML = '<div class="me-empty">불러오는 중…</div>';
  STATE.rows = await db().submissions.listMine();
  renderPhotoCounts();
  renderPhotoList();
}

function renderPhotoCounts() {
  const counts = { all: STATE.rows.length, pending: 0, approved: 0, rejected: 0 };
  for (const r of STATE.rows) counts[r.status] = (counts[r.status] || 0) + 1;
  for (const k of ['all', 'pending', 'approved', 'rejected']) {
    const el = $(`cnt-${k}`);
    if (el) el.textContent = counts[k];
  }
}

function renderPhotoList() {
  const rows = STATE.filter === 'all' ? STATE.rows : STATE.rows.filter(r => r.status === STATE.filter);
  if (rows.length === 0) {
    $('list').innerHTML = `
      <div class="me-empty">
        ${STATE.filter === 'all' ? '아직 올린 사진이 없어요.' : '이 분류에 해당하는 사진이 없어요.'}
        <br /><a class="me-empty-cta" href="index.html">메인에서 사진 올리러 가기 →</a>
      </div>`;
    return;
  }
  $('list').innerHTML = rows.map(renderPhotoCard).join('');
  bindPhotoCardActions();
}

function renderPhotoCard(r) {
  const url = db().submissions.publicUrl(r.storage_path);
  const igNorm = (r.instagram || '').replace(/^@/, '');
  const deleteLabel = r.status === 'pending' ? '제출 취소' : '삭제';
  return `
    <div class="me-card" data-id="${r.id}">
      <div class="me-card-img" data-zoom="${escapeAttr(url)}">
        <img src="${escapeAttr(url)}" alt="" loading="lazy" onerror="this.closest('.me-card-img').classList.add('is-missing'); this.remove();" />
      </div>
      <div class="me-card-meta">
        <div>
          <span class="me-card-status ${escapeAttr(r.status)}">${escapeHtml(statusLabel(r.status))}</span>
          ${r.theme_month ? `<span class="me-card-theme">🎬 ${escapeHtml(r.theme_month)} 응모</span>` : ''}
        </div>
        <div class="me-card-row"><span class="k">제출</span><span class="v">${fmtDate(r.created_at)}</span></div>
        <div class="me-card-row"><span class="k">이름</span><span class="v" data-field="submitter_name">${escapeHtml(r.submitter_name || '-')}</span></div>
        <div class="me-card-row"><span class="k">인스타</span><span class="v" data-field="instagram">${escapeHtml(r.instagram || '-')}</span></div>
        <div class="me-card-row"><span class="k">필름</span><span class="v" data-field="film">${escapeHtml(r.film || '-')}</span></div>
        <div class="me-card-row"><span class="k">카메라</span><span class="v" data-field="camera">${escapeHtml(r.camera || '-')}</span></div>
        <div class="me-card-row"><span class="k">메모</span><span class="v" data-field="caption">${escapeHtml(r.caption || '-')}</span></div>
        ${r.rejection_reason ? `<div class="me-card-row"><span class="k">반려 사유</span><span class="v">${escapeHtml(r.rejection_reason)}</span></div>` : ''}
        <div class="me-card-actions">
          <button type="button" class="me-btn me-btn-secondary" data-action="edit">수정</button>
          <button type="button" class="me-btn me-btn-danger" data-action="delete">${escapeHtml(deleteLabel)}</button>
        </div>
      </div>
    </div>`;
}

function enterEditMode(card) {
  const id = card.dataset.id;
  const row = STATE.rows.find(r => r.id === id);
  if (!row) return;
  const fields = ['submitter_name', 'instagram', 'film', 'camera', 'caption'];
  for (const f of fields) {
    const cell = card.querySelector(`[data-field="${f}"]`);
    if (!cell) continue;
    const v = row[f] || '';
    const max = f === 'caption' ? 200 : f === 'film' ? 120 : f === 'instagram' || f === 'camera' ? 80 : 60;
    cell.innerHTML = f === 'caption'
      ? `<textarea data-edit="${f}" maxlength="${max}">${escapeHtml(v)}</textarea>`
      : `<input type="text" data-edit="${f}" maxlength="${max}" value="${escapeAttr(v)}" />`;
  }
  const actions = card.querySelector('.me-card-actions');
  actions.innerHTML = `
    <button type="button" class="me-btn me-btn-primary" data-action="save">저장</button>
    <button type="button" class="me-btn me-btn-secondary" data-action="cancel-edit">취소</button>`;
}

async function savePhotoEdits(card) {
  const id = card.dataset.id;
  const patch = {};
  card.querySelectorAll('[data-edit]').forEach(el => {
    const f = el.dataset.edit;
    const v = el.value.trim();
    patch[f] = v === '' ? null : v;
  });
  if (patch.instagram) patch.instagram = '@' + patch.instagram.replace(/^@/, '');
  const saveBtn = card.querySelector('[data-action="save"]');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중…'; }
  const { error } = await db().submissions.updateMine(id, patch);
  if (error) {
    alert('수정 실패: ' + error.message);
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장'; }
    return;
  }
  await loadPhotos();
}

async function deletePhoto(card) {
  if (!confirm('이 사진의 제출을 취소할까요? 저장된 파일도 함께 삭제됩니다.')) return;
  const id   = card.dataset.id;
  const row  = STATE.rows.find(r => r.id === id);
  const path = row?.storage_path;
  const btn  = card.querySelector('[data-action="delete"]');
  const origLabel = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = '삭제 중…'; }
  const { data, error } = await db().submissions.deleteMine(id);
  // RLS 가 silently 차단하면 error 없이 data: [] 로 돌아옴 — 반드시 명시 검사.
  // 검사 없이 storage 만 지우면 DB row 남아서 깨진 썸네일이 생김.
  if (error || !data?.length) {
    alert('삭제 실패: ' + (error?.message || '서버에서 거부했습니다. 관리자에게 문의해주세요.'));
    if (btn) { btn.disabled = false; btn.textContent = origLabel || '삭제'; }
    return;
  }
  if (path) await db().submissions.removePhoto(path);
  await loadPhotos();
}

function bindPhotoCardActions() {
  // 이벤트 위임 — 카드 자체에 click 한 번만 바인딩.
  // enterEditMode 가 액션 버튼을 새 HTML 로 교체하기 때문에 개별 버튼
  // addEventListener 방식은 새 버튼(저장/취소) 에 핸들러가 안 붙어 동작 X.
  document.querySelectorAll('#section-photos .me-card').forEach(card => {
    if (card.dataset.bound === '1') return;
    card.dataset.bound = '1';
    card.addEventListener('click', (e) => {
      // 사진 영역 클릭 → 라이트박스
      const zoom = e.target.closest('[data-zoom]');
      if (zoom) {
        $('imgZoomTarget').src = zoom.dataset.zoom;
        $('imgZoom').classList.add('open');
        return;
      }
      // 액션 버튼
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const a = btn.dataset.action;
      if (a === 'edit')             enterEditMode(card);
      else if (a === 'save')        savePhotoEdits(card);
      else if (a === 'cancel-edit') renderPhotoList();
      else if (a === 'delete')      deletePhoto(card);
    });
  });
}

// ═════════════════════════════════════════
// 매물 섹션
// ═════════════════════════════════════════
async function loadMarket() {
  $('marketList').innerHTML = '<div class="me-empty">불러오는 중…</div>';
  STATE.marketRows = await db().market.listMine();
  renderMarketList();
}

function renderMarketList() {
  const rows = STATE.marketRows;
  if (rows.length === 0) {
    $('marketList').innerHTML = `
      <div class="me-empty">
        아직 올린 매물이 없어요.
        <br /><a class="me-empty-cta" href="market.html#new">매물 올리러 가기 →</a>
      </div>`;
    return;
  }
  $('marketList').innerHTML = rows.map(renderMarketCard).join('');
  bindMarketCardActions();
}

function renderMarketCard(r) {
  const firstPath = r.storage_paths?.[0];
  const url = firstPath ? db().market.publicUrl(firstPath) : '';
  const next = nextStatusOf(r.status);
  const canEdit = r.status !== 'hidden';
  return `
    <div class="me-card" data-id="${r.id}" data-status="${escapeAttr(r.status)}">
      <div class="me-card-img" data-zoom="${escapeAttr(url)}">
        ${url ? `<img src="${escapeAttr(url)}" alt="" loading="lazy" />` : ''}
      </div>
      <div class="me-card-meta">
        <div>
          <span class="me-card-status ${escapeAttr(r.status)}">${escapeHtml(statusLabel(r.status))}</span>
        </div>
        <h3 class="me-market-card-title">${escapeHtml(r.title)}</h3>
        <div class="me-market-card-price">${escapeHtml(r.price)}</div>
        <div class="me-market-card-meta">
          <span>${escapeHtml(CAT_LABELS[r.category] || r.category)}</span>
          ${r.location ? `<span>· ${escapeHtml(r.location)}</span>` : ''}
          <span>· ${fmtDateShort(r.created_at)}</span>
          <span>· 사진 ${r.storage_paths?.length || 0}장</span>
        </div>
        <div class="me-card-actions">
          ${canEdit ? `<button type="button" class="me-btn me-btn-secondary" data-action="cycle">${escapeHtml(statusLabel(r.status))} → ${escapeHtml(statusLabel(next))}</button>` : ''}
          ${canEdit ? `<a href="market.html?edit=${escapeAttr(r.id)}" class="me-btn me-btn-secondary">수정</a>` : ''}
          <button type="button" class="me-btn me-btn-danger" data-action="delete">삭제</button>
        </div>
      </div>
    </div>`;
}

function bindMarketCardActions() {
  document.querySelectorAll('#section-market .me-card').forEach(card => {
    card.querySelector('[data-zoom]')?.addEventListener('click', e => {
      const src = e.currentTarget.dataset.zoom;
      if (!src) return;
      $('imgZoomTarget').src = src;
      $('imgZoom').classList.add('open');
    });
    card.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = card.dataset.id;
        const status = card.dataset.status;
        const a = btn.dataset.action;
        if (a === 'cycle') {
          btn.disabled = true;
          const { error } = await db().market.cycleStatusMine(id, status);
          if (error) { alert('상태 변경 실패: ' + error.message); btn.disabled = false; return; }
          await loadMarket();
        } else if (a === 'delete') {
          if (!confirm('이 매물을 삭제할까요? 사진 파일도 함께 삭제됩니다.')) return;
          btn.disabled = true; btn.textContent = '삭제 중…';
          const row = STATE.marketRows.find(r => r.id === id);
          const { data, error } = await db().market.deleteMine(id);
          // RLS silent block 가드 — data 비면 storage 건드리지 않고 종료
          if (error || !data?.length) {
            alert('삭제 실패: ' + (error?.message || '서버에서 거부했습니다.'));
            btn.disabled = false; btn.textContent = '삭제';
            return;
          }
          if (row?.storage_paths?.length) await db().market.removePhotos(row.storage_paths);
          await loadMarket();
        }
      });
    });
  });
}

// ═════════════════════════════════════════
// 페이지 탭 전환
// ═════════════════════════════════════════
function switchSection(sec) {
  STATE.section = sec;
  document.querySelectorAll('.me-pagetab').forEach(t => t.classList.toggle('active', t.dataset.section === sec));
  $('section-photos').hidden = sec !== 'photos';
  $('section-market').hidden = sec !== 'market';
  if (sec === 'market' && STATE.marketRows.length === 0) loadMarket();
  // URL hash 동기화 (#market 또는 #photos)
  try { history.replaceState(null, '', '#' + sec); } catch (_) {}
}

document.querySelectorAll('.me-pagetab').forEach(t => {
  t.addEventListener('click', () => switchSection(t.dataset.section));
});

document.querySelectorAll('.me-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.me-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    STATE.filter = tab.dataset.status;
    renderPhotoList();
  });
});

$('imgZoom').addEventListener('click', () => {
  $('imgZoom').classList.remove('open');
  $('imgZoomTarget').src = '';
});

(async function main() {
  for (let i = 0; i < 50; i++) {
    if (db() && db().isReady()) break;
    await new Promise(r => setTimeout(r, 50));
  }
  const ok = await checkAuth();
  if (!ok) return;
  $('gate').hidden = true;
  $('app').hidden = false;
  await loadPhotos();
  // URL hash 가 #market 이면 매물 탭으로 시작
  if (location.hash === '#market') switchSection('market');
})();
</script>
