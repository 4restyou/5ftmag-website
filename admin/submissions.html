<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Reader's Roll 검토 — 5ft.mag Admin</title>
  <link rel="icon" type="image/svg+xml" href="../img/favicon/icon.svg">
  <link rel="stylesheet" href="../pretendard.css" />
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/common.css?v=20260511-imgfix">
  <style>
    body { background: var(--bg); color: var(--text); }

    .admin-header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 24px;
      border-bottom: 1px solid var(--border);
    }
    .admin-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 24px;
      transition: color .15s;
    }
    .admin-back:hover { color: var(--text); }
    .admin-title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .admin-title {
      font-size: 28px;
      font-weight: var(--fw-heading);
      letter-spacing: -0.02em;
      margin: 0;
    }
    .admin-user {
      font-size: 13px;
      color: var(--text-muted);
    }
    .admin-user button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .admin-user button:hover { color: var(--text); }

    .admin-tabs {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
    }
    .admin-tab {
      padding: 10px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      font-weight: var(--fw-heading);
      color: var(--text-muted);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: color .15s, border-color .15s;
    }
    .admin-tab:hover { color: var(--text); }
    .admin-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }
    .admin-tab .count {
      display: inline-block;
      background: var(--bg-sub);
      color: var(--text-muted);
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 999px;
      margin-left: 6px;
      font-weight: var(--fw-heading);
    }
    .admin-tab.active .count {
      background: var(--text);
      color: var(--bg);
    }

    .admin-list {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .sub-card {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 24px;
      padding: 20px;
      background: var(--bg-sub);
      border-radius: 6px;
      align-items: start;
    }
    .sub-card-img {
      width: 220px;
      aspect-ratio: 1;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      cursor: zoom-in;
    }
    .sub-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sub-card-meta {
      display: grid;
      gap: 10px;
      font-size: 14px;
    }
    .sub-card-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
      align-items: baseline;
      line-height: 1.55;
    }
    .sub-card-row .k {
      font-size: 11px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .sub-card-row .v { color: var(--text); word-break: break-word; }
    .sub-card-row .v a { color: var(--text); text-decoration: underline; text-underline-offset: 2px; }

    .sub-card-status {
      display: inline-block;
      font-size: 11px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
    }
    .sub-card-status.pending  { background: #fef3c7; color: #78350f; }
    .sub-card-status.approved { background: #d1fae5; color: #064e3b; }
    .sub-card-status.rejected { background: #fee2e2; color: #7f1d1d; }

    .sub-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .sub-btn {
      font: inherit;
      font-size: 13px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.02em;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .sub-btn:hover { opacity: 0.85; }
    .sub-btn:disabled { opacity: 0.4; cursor: progress; }
    .sub-btn-approve { background: #064e3b; color: #fff; }
    .sub-btn-reject  { background: #fff; color: #7f1d1d; border: 1px solid #fca5a5; }
    .sub-btn-delete  { background: none; color: var(--text-muted); }
    .sub-btn-delete:hover { color: #7f1d1d; }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .gate {
      max-width: 560px;
      margin: 80px auto;
      padding: 40px 24px;
      text-align: center;
    }
    .gate h2 { font-size: 22px; font-weight: var(--fw-heading); margin: 0 0 12px; }
    .gate p { color: var(--text-muted); line-height: 1.6; margin: 0 0 20px; }
    .gate .gate-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: var(--fw-heading);
      cursor: pointer;
    }

    /* 사진 확대 라이트박스 */
    .img-zoom {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center; justify-content: center;
      z-index: 9999;
      cursor: zoom-out;
      padding: 24px;
    }
    .img-zoom.open { display: flex; }
    .img-zoom img { max-width: 100%; max-height: 100%; object-fit: contain; }

    @media (max-width: 720px) {
      .sub-card { grid-template-columns: 1fr; }
      .sub-card-img { width: 100%; aspect-ratio: 4/3; }
      .sub-card-row { grid-template-columns: 1fr; gap: 2px; }
    }

    /* 필름 매칭 — 정정 추천 / 직접 수정 */
    .film-current {
      font-weight: var(--fw-heading);
    }
    .film-edit-btn {
      margin-left: 8px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.04em;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .film-edit-btn:hover {
      color: var(--text);
      border-color: var(--text);
    }
    .film-match {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 10px;
      border-radius: 4px;
    }
    .film-match strong {
      font-weight: var(--fw-heading);
    }
    .film-match-exact {
      background: #d1fae5;
      color: #064e3b;
    }
    .film-match-fuzzy {
      background: #fef3c7;
      color: #78350f;
    }
    .film-match-new {
      background: var(--bg);
      color: var(--text-muted);
      border: 1px dashed var(--border);
      font-style: italic;
    }
    .film-match-apply {
      font: inherit;
      font-size: 11px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.04em;
      border: none;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      background: #064e3b;
      color: #fff;
      transition: opacity .15s;
    }
    .film-match-apply:hover { opacity: 0.88; }
    .film-match-fuzzy .film-match-apply {
      background: #78350f;
    }

    /* 페이지네이션 */
    .admin-pagination {
      max-width: 1100px;
      margin: 8px auto 48px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .admin-page {
      min-width: 32px;
      padding: 6px 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
    }
    .admin-page:hover:not(:disabled):not(.is-active) {
      border-color: var(--text);
    }
    .admin-page.is-active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .admin-page:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .admin-page-gap {
      color: var(--text-muted);
      padding: 0 4px;
      font-size: 13px;
    }
    .admin-page-info {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="admin-header">
  <a href="../index.html" class="admin-back">← 5ft.mag</a>
  <div class="admin-title-row">
    <h1 class="admin-title">Reader's Roll 검토 큐</h1>
    <div class="admin-user" id="adminUser"></div>
  </div>
</div>

<div id="gate" class="gate" hidden>
  <h2>편집부 전용</h2>
  <p>이 페이지는 5ft.mag 편집부 권한이 있는 계정만 접근할 수 있어요.</p>
  <button class="gate-btn" id="gateLogin">Google로 로그인</button>
</div>

<div id="app" hidden>
  <div class="admin-tabs">
    <button type="button" class="admin-tab active" data-status="pending">대기 <span class="count" id="cnt-pending">·</span></button>
    <button type="button" class="admin-tab" data-status="approved">승인됨 <span class="count" id="cnt-approved">·</span></button>
    <button type="button" class="admin-tab" data-status="rejected">반려됨 <span class="count" id="cnt-rejected">·</span></button>
  </div>
  <div class="admin-list" id="list">
    <div class="empty-state">불러오는 중…</div>
  </div>
  <nav class="admin-pagination" id="pagination" aria-label="페이지" hidden></nav>
</div>

<div class="img-zoom" id="imgZoom"><img id="imgZoomTarget" alt="" /></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/db-client.js?v=20260513-deletefix"></script>
<script src="../js/reader-submissions.js?v=20260512-pool"></script>
<script>
'use strict';

const STATE = {
  user: null,
  isEditor: false,
  status: 'pending',
  rows: [],
  counts: { pending: 0, approved: 0, rejected: 0 },
  films: {},
  page: 1,
};

const PAGE_SIZE = 10;

function $(id) { return document.getElementById(id); }
function db() { return window.MagDB; }
function publicUrl(path) {
  return (db()?.storageBaseUrl || '') + path;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function checkAccess() {
  if (!db() || !db().isReady()) {
    document.body.innerHTML = '<div class="gate"><h2>인증 모듈 로드 실패</h2><p>새로고침해주세요.</p></div>';
    return false;
  }
  const session = await db().auth.getSession();
  if (!session) { showGate(); return false; }
  STATE.user = session.user;

  const profile = await db().profiles.getMine();
  if (!profile?.is_editor) {
    showGate('접근 권한이 없어요.');
    return false;
  }
  STATE.isEditor = true;
  $('adminUser').innerHTML = `${escapeHtml(profile.display_name || session.user.email || '')} · <button id="logout">로그아웃</button>`;
  $('logout').addEventListener('click', async () => {
    await db().auth.signOut();
    location.reload();
  });
  return true;
}

function showGate(msg) {
  $('gate').hidden = false;
  $('app').hidden = true;
  if (msg) {
    $('gate').querySelector('p').textContent = msg;
    $('gateLogin').style.display = 'none';
  }
  $('gateLogin').addEventListener('click', async () => {
    await db().auth.signInWithGoogle(window.location.href.split('#')[0]);
  });
}

async function loadCounts() {
  for (const status of ['pending', 'approved', 'rejected']) {
    const n = await db().review.count(status);
    STATE.counts[status] = n;
    const el = $(`cnt-${status}`);
    if (el) el.textContent = n;
  }
}

async function loadList() {
  $('list').innerHTML = '<div class="empty-state">불러오는 중…</div>';
  const pageNav = $('pagination');
  if (pageNav) pageNav.hidden = true;

  const total = STATE.counts[STATE.status] || 0;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (STATE.page > totalPages) STATE.page = totalPages;
  if (STATE.page < 1) STATE.page = 1;
  const from = (STATE.page - 1) * PAGE_SIZE;
  const to   = from + PAGE_SIZE - 1;

  const { data, error } = await db().review.list(STATE.status, from, to);

  if (error) {
    $('list').innerHTML = `<div class="empty-state">불러오기 실패: ${escapeHtml(error.message)}</div>`;
    return;
  }
  STATE.rows = data || [];
  if (STATE.rows.length === 0) {
    $('list').innerHTML = `<div class="empty-state">${STATE.status === 'pending' ? '대기 중인 제출이 없어요.' : (STATE.status === 'approved' ? '아직 승인된 제출이 없어요.' : '반려된 제출이 없어요.')}</div>`;
    return;
  }
  $('list').innerHTML = STATE.rows.map(renderCard).join('');
  bindCardActions();
  renderPagination(total, totalPages);
}

function renderPagination(total, totalPages) {
  const nav = $('pagination');
  if (!nav) return;
  if (totalPages <= 1) { nav.hidden = true; nav.innerHTML = ''; return; }
  const cur = STATE.page;
  const btn = (label, page, opts = {}) => {
    const disabled = opts.disabled ? ' disabled' : '';
    const active   = opts.active ? ' is-active' : '';
    return `<button type="button" class="admin-page${active}" data-page="${page}"${disabled} aria-label="${escapeHtml(opts.aria || label)}">${escapeHtml(label)}</button>`;
  };
  // 페이지 윈도우 (cur 주변 ±2)
  const pages = [];
  const start = Math.max(1, cur - 2);
  const end   = Math.min(totalPages, cur + 2);
  for (let p = start; p <= end; p++) pages.push(p);
  let html = btn('‹', cur - 1, { disabled: cur === 1, aria: '이전 페이지' });
  if (start > 1) {
    html += btn('1', 1);
    if (start > 2) html += `<span class="admin-page-gap">…</span>`;
  }
  for (const p of pages) html += btn(String(p), p, { active: p === cur });
  if (end < totalPages) {
    if (end < totalPages - 1) html += `<span class="admin-page-gap">…</span>`;
    html += btn(String(totalPages), totalPages);
  }
  html += btn('›', cur + 1, { disabled: cur === totalPages, aria: '다음 페이지' });
  html += `<span class="admin-page-info">총 ${total}건 · ${cur} / ${totalPages}페이지</span>`;
  nav.innerHTML = html;
  nav.hidden = false;
  nav.querySelectorAll('.admin-page').forEach(b => {
    b.addEventListener('click', () => {
      const p = Number(b.dataset.page);
      if (!Number.isFinite(p) || b.disabled || p === cur) return;
      STATE.page = p;
      loadList();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function getFilmMatchHint(filmText) {
  if (!filmText || typeof window.findFilmMatch !== 'function') return '';
  const match = window.findFilmMatch(filmText, STATE.films);
  if (!match) {
    return `<div class="film-match film-match-new">현재 라이브러리에 없는 필름. 승인 시 새 항목으로 잡거나, 정확한 표기를 직접 입력하세요.</div>`;
  }
  const normalize = window.normalizeFilmName;
  if (match.type === 'exact') {
    if (normalize(filmText) === normalize(match.canonical) && filmText.trim() === match.canonical) {
      return ''; // 이미 정식 표기 그대로 — 표시 안 함
    }
    return `<div class="film-match film-match-exact">
      정식 표기: <strong>${escapeHtml(match.canonical)}</strong>
      <button class="film-match-apply" data-action="apply-film" data-canonical="${escapeHtml(match.canonical)}">이 이름으로 저장</button>
    </div>`;
  }
  // fuzzy
  return `<div class="film-match film-match-fuzzy">
    추천: <strong>${escapeHtml(match.canonical)}</strong>
    <button class="film-match-apply" data-action="apply-film" data-canonical="${escapeHtml(match.canonical)}">이 필름으로 정정</button>
  </div>`;
}

function renderCard(r) {
  const url = publicUrl(r.storage_path);
  const igNorm = (r.instagram || '').replace(/^@/, '');
  const igUrl = igNorm ? `https://instagram.com/${igNorm}` : null;
  const themeBadge = r.theme_month ? `<span class="sub-card-status pending" style="margin-left:8px; background:#e0e7ff; color:#3730a3;">테마 ${r.theme_month}</span>` : '';
  const filmMatchHint = getFilmMatchHint(r.film);

  return `
    <div class="sub-card" data-id="${r.id}" data-path="${escapeHtml(r.storage_path)}">
      <div class="sub-card-img" data-zoom="${escapeHtml(url)}">
        <img src="${escapeHtml(url)}" alt="" loading="lazy" />
      </div>
      <div class="sub-card-meta">
        <div>
          <span class="sub-card-status ${escapeHtml(r.status)}">${escapeHtml(r.status)}</span>
          ${themeBadge}
        </div>
        <div class="sub-card-row">
          <span class="k">제출</span>
          <span class="v">${fmtDate(r.created_at)}</span>
        </div>
        ${r.submitter_name ? `
        <div class="sub-card-row">
          <span class="k">이름</span>
          <span class="v">${escapeHtml(r.submitter_name)}</span>
        </div>` : ''}
        <div class="sub-card-row">
          <span class="k">인스타</span>
          <span class="v">${igUrl ? `<a href="${escapeHtml(igUrl)}" target="_blank" rel="noopener">${escapeHtml(r.instagram)}</a>` : escapeHtml(r.instagram || '-')}</span>
        </div>
        <div class="sub-card-row">
          <span class="k">필름</span>
          <span class="v">
            <span class="film-current">${escapeHtml(r.film || '-')}</span>
            <button class="film-edit-btn" data-action="edit-film" data-film="${escapeHtml(r.film || '')}">직접 수정</button>
            ${filmMatchHint}
          </span>
        </div>
        ${r.camera ? `
        <div class="sub-card-row">
          <span class="k">카메라</span>
          <span class="v">${escapeHtml(r.camera)}</span>
        </div>` : ''}
        ${r.caption ? `
        <div class="sub-card-row">
          <span class="k">메모</span>
          <span class="v">${escapeHtml(r.caption)}</span>
        </div>` : ''}
        ${r.rejection_reason ? `
        <div class="sub-card-row">
          <span class="k">반려 사유</span>
          <span class="v">${escapeHtml(r.rejection_reason)}</span>
        </div>` : ''}
        <div class="sub-card-actions">
          ${STATE.status === 'pending' ? `
            <button type="button" class="sub-btn sub-btn-approve" data-action="approve">승인</button>
            <button type="button" class="sub-btn sub-btn-reject" data-action="reject">반려</button>
          ` : ''}
          ${STATE.status === 'rejected' ? `
            <button type="button" class="sub-btn sub-btn-approve" data-action="approve">승인으로 변경</button>
          ` : ''}
          ${STATE.status === 'approved' ? `
            <button type="button" class="sub-btn sub-btn-reject" data-action="reject">반려로 되돌리기</button>
          ` : ''}
          <button type="button" class="sub-btn sub-btn-delete" data-action="delete">완전 삭제</button>
        </div>
      </div>
    </div>`;
}

function bindCardActions() {
  document.querySelectorAll('.sub-card').forEach(card => {
    const id = card.dataset.id;
    const path = card.dataset.path;

    card.querySelector('[data-zoom]')?.addEventListener('click', (e) => {
      const url = e.currentTarget.dataset.zoom;
      $('imgZoomTarget').src = url;
      $('imgZoom').classList.add('open');
    });

    card.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const action = btn.dataset.action;
        if (action === 'apply-film') {
          const canonical = btn.dataset.canonical || '';
          if (!canonical) return;
          btn.disabled = true;
          const { error } = await db().review.patch(id, { film: canonical });
          if (error) { alert('필름 정정 실패: ' + error.message); btn.disabled = false; return; }
          await loadList();
        } else if (action === 'edit-film') {
          const current = btn.dataset.film || '';
          const v = prompt('필름 표기를 직접 수정합니다.\n(예: Kodak Portra 400)', current);
          if (v === null) return;
          const trimmed = String(v).trim();
          if (!trimmed) { alert('필름 표기는 비워둘 수 없습니다.'); return; }
          if (trimmed === current) return;
          btn.disabled = true;
          const { error } = await db().review.patch(id, { film: trimmed });
          if (error) { alert('수정 실패: ' + error.message); btn.disabled = false; return; }
          await loadList();
        } else if (action === 'approve') {
          btn.disabled = true; btn.textContent = '처리 중…';
          const { error } = await db().review.patch(id, {
            status: 'approved', rejection_reason: null,
            reviewed_at: new Date().toISOString(), reviewed_by: STATE.user.id,
          });
          if (error) { alert('승인 실패: ' + error.message); btn.disabled = false; btn.textContent = '승인'; return; }
          await Promise.all([loadCounts(), loadList()]);
        } else if (action === 'reject') {
          const reason = prompt('반려 사유를 입력하세요 (선택, 비워둬도 됩니다):', '');
          if (reason === null) return;
          btn.disabled = true; btn.textContent = '처리 중…';
          const { error } = await db().review.patch(id, {
            status: 'rejected', rejection_reason: reason || null,
            reviewed_at: new Date().toISOString(), reviewed_by: STATE.user.id,
          });
          if (error) { alert('반려 실패: ' + error.message); btn.disabled = false; btn.textContent = '반려'; return; }
          await Promise.all([loadCounts(), loadList()]);
        } else if (action === 'delete') {
          if (!confirm('완전히 삭제할까요? Storage의 파일과 DB의 기록 모두 지워집니다.')) return;
          btn.disabled = true; btn.textContent = '삭제 중…';
          const { error: dbErr } = await db().review.remove(id);
          if (dbErr) { alert('DB 삭제 실패: ' + dbErr.message); btn.disabled = false; btn.textContent = '완전 삭제'; return; }
          if (path) await db().submissions.removePhoto(path);
          await Promise.all([loadCounts(), loadList()]);
        }
      });
    });
  });
}

document.querySelectorAll('.admin-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    STATE.status = tab.dataset.status;
    STATE.page = 1;
    loadList();
  });
});

$('imgZoom').addEventListener('click', () => {
  $('imgZoom').classList.remove('open');
  $('imgZoomTarget').src = '';
});

async function loadFilms() {
  try {
    const r = await fetch('../data/films.json', { cache: 'no-cache' });
    if (!r.ok) return;
    STATE.films = await r.json();
  } catch (_) {}
}

(async function main() {
  for (let i = 0; i < 50; i++) {
    if (db() && db().isReady()) break;
    await new Promise(r => setTimeout(r, 50));
  }
  for (let i = 0; i < 20; i++) {
    if (typeof window.findFilmMatch === 'function') break;
    await new Promise(r => setTimeout(r, 25));
  }
  const ok = await checkAccess();
  if (!ok) return;
  $('gate').hidden = true;
  $('app').hidden = false;
  await Promise.all([loadFilms(), loadCounts(), loadList()]);
})();
</script>
