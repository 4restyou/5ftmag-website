<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Reader's Roll 검토 | 5ft magazine Admin</title>
  <link rel="icon" type="image/svg+xml" href="../img/favicon/icon.svg">
  <link rel="stylesheet" href="../pretendard.css" />
  <link rel="stylesheet" href="../css/tokens.css?v=20260603-states">
  <link rel="stylesheet" href="../css/common.css?v=20260603-overflow">
  <script src="../js/theme-init.js"></script>
  <style>
    body { background: var(--bg); color: var(--text); }

    .admin-header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 24px;
      border-bottom: 1px solid var(--border);
    }
    .admin-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 24px;
      transition: color .15s;
    }
    .admin-back:hover { color: var(--text); }
    .admin-title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .admin-title {
      font-size: 28px;
      font-weight: var(--fw-heading);
      letter-spacing: -0.02em;
      margin: 0;
    }
    .admin-user {
      font-size: 13px;
      color: var(--text-muted);
    }
    .admin-user button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .admin-user button:hover { color: var(--text); }

    /* 편집부 페이지 간 sub-nav (투고 검토 / 매물 신고) */
    .admin-subnav {
      display: flex; gap: 24px; margin-top: 18px;
      font-size: 13px; font-weight: var(--fw-heading); letter-spacing: 0.04em;
    }
    .admin-subnav-link {
      color: var(--text-muted); text-decoration: none;
      padding-bottom: 6px; border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .admin-subnav-link:hover { color: var(--text); }
    .admin-subnav-link.is-current { color: var(--text); border-bottom-color: var(--text); }
    .admin-subnav-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 6px;
      background: #e0245e; color: #fff;
      font-size: 11px; font-weight: var(--fw-heading); letter-spacing: 0;
      border-radius: 999px;
    }

    .admin-tabs {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
    }
    .admin-tab {
      padding: 10px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 14px;
      font-weight: var(--fw-heading);
      color: var(--text-muted);
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: color .15s, border-color .15s;
    }
    .admin-tab:hover { color: var(--text); }
    .admin-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }
    .admin-tab .count {
      display: inline-block;
      background: var(--bg-sub);
      color: var(--text-muted);
      font-size: 11px;
      padding: 1px 7px;
      border-radius: var(--badge-radius);
      margin-left: 6px;
      font-weight: var(--fw-heading);
    }
    .admin-tab.active .count {
      background: var(--text);
      color: var(--bg);
    }
    /* 테마만 보기 토글 — status 탭 옆 */
    .admin-tabs-spacer { flex: 1; }
    .admin-filter-chip {
      align-self: center;
      margin-bottom: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.04em;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--chip-radius);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .admin-filter-chip:hover {
      color: var(--text);
      border-color: var(--text);
    }
    .admin-filter-chip.is-active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    [data-theme="dark"] .admin-filter-chip {
      background: var(--bg);
      color: var(--text-muted);
      border-color: var(--border);
    }
    [data-theme="dark"] .admin-filter-chip.is-active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .admin-list {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .sub-card {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 24px;
      padding: 20px;
      background: var(--bg-sub);
      border-radius: 6px;
      align-items: start;
    }
    .sub-card-img {
      width: 220px;
      aspect-ratio: 1;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
      cursor: zoom-in;
    }
    .sub-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sub-card-meta {
      display: grid;
      gap: 10px;
      font-size: 14px;
    }
    .sub-card-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
      align-items: baseline;
      line-height: 1.55;
    }
    .sub-card-row .k {
      font-size: 11px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .sub-card-row .v { color: var(--text); word-break: break-word; }
    .sub-card-row .v a { color: var(--text); text-decoration: underline; text-underline-offset: 2px; }

    .sub-card-status {
      display: inline-block;
      font-size: 11px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
    }
    .sub-card-status.pending  { background: #fef3c7; color: #78350f; }
    .sub-card-status.approved { background: #d1fae5; color: #064e3b; }
    .sub-card-status.rejected { background: #fee2e2; color: #7f1d1d; }
    /* ♡ 카운트 배지 (편집부 전용 — 우수작 선정 보조) */
    .sub-card-likes {
      display: inline-block; margin-left: 8px;
      font-size: 11px; font-weight: var(--fw-heading); letter-spacing: 0.04em;
      padding: 2px 8px; border-radius: 2px;
      background: #fce7f3; color: #9d174d;
    }

    .sub-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .sub-btn {
      font: inherit;
      font-size: 13px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.02em;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      transition: opacity .15s;
    }
    .sub-btn:hover { opacity: 0.85; }
    .sub-btn:disabled { opacity: 0.4; cursor: progress; }
    .sub-btn-approve { background: #064e3b; color: #fff; }
    .sub-btn-reject  { background: #fff; color: #7f1d1d; border: 1px solid #fca5a5; }
    .sub-btn-delete  { background: none; color: var(--text-muted); }
    .sub-btn-delete:hover { color: #7f1d1d; }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .gate {
      max-width: 560px;
      margin: 80px auto;
      padding: 40px 24px;
      text-align: center;
    }
    .gate h2 { font-size: 22px; font-weight: var(--fw-heading); margin: 0 0 12px; }
    .gate p { color: var(--text-muted); line-height: 1.6; margin: 0 0 20px; }
    .gate .gate-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: var(--fw-heading);
      cursor: pointer;
    }

    /* 사진 확대 라이트박스 */
    .img-zoom {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center; justify-content: center;
      z-index: 9999;
      cursor: zoom-out;
      padding: 24px;
    }
    .img-zoom.open { display: flex; }
    .img-zoom img { max-width: 100%; max-height: 100%; object-fit: contain; }

    @media (max-width: 720px) {
      .sub-card { grid-template-columns: 1fr; }
      .sub-card-img { width: 100%; aspect-ratio: 4/3; }
      .sub-card-row { grid-template-columns: 1fr; gap: 2px; }
    }

    /* 필름 매칭 — 정정 추천 / 직접 수정 */
    .film-current {
      font-weight: var(--fw-heading);
    }
    .film-edit-btn {
      margin-left: 8px;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.04em;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .film-edit-btn:hover {
      color: var(--text);
      border-color: var(--text);
    }
    .film-match {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.45;
      padding: 6px 10px;
      border-radius: 4px;
    }
    .film-match strong {
      font-weight: var(--fw-heading);
    }
    .film-match-exact {
      background: #d1fae5;
      color: #064e3b;
    }
    .film-match-fuzzy {
      background: #fef3c7;
      color: #78350f;
    }
    .film-match-new {
      background: var(--bg);
      color: var(--text-muted);
      border: 1px dashed var(--border);
      font-style: italic;
    }
    .film-match-apply {
      font: inherit;
      font-size: 11px;
      font-weight: var(--fw-heading);
      letter-spacing: 0.04em;
      border: none;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      background: #064e3b;
      color: #fff;
      transition: opacity .15s;
    }
    .film-match-apply:hover { opacity: 0.88; }
    .film-match-fuzzy .film-match-apply {
      background: #78350f;
    }

    /* 페이지네이션 */
    .admin-pagination {
      max-width: 1100px;
      margin: 8px auto 48px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .admin-page {
      min-width: 32px;
      padding: 6px 10px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 3px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
    }
    .admin-page:hover:not(:disabled):not(.is-active) {
      border-color: var(--text);
    }
    .admin-page.is-active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .admin-page:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .admin-page-gap {
      color: var(--text-muted);
      padding: 0 4px;
      font-size: 13px;
    }
    .admin-page-info {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-muted);
    }
    .admin-subnav { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .admin-subnav::-webkit-scrollbar { display: none; }
    .admin-subnav-link { white-space: nowrap; flex: 0 0 auto; }
  </style>
</head>

<script>
'use strict';

const STATE = {
  user: null,
  isEditor: false,
  status: 'pending',
  rows: [],
  counts: { pending: 0, approved: 0, rejected: 0 },
  films: {},
  page: 1,
  themeOnly: false, // 테마 응모만 필터링 (theme_month NOT NULL)
  likeSort: false,  // 좋아요 순 정렬 모드 — 편집부 우수작 선정 보조
  likes: new Map(), // submission_id → like_count
  allRows: [],      // 좋아요 순 모드일 때 status 전체를 한 번 끌어와 정렬한 결과
};

const PAGE_SIZE = 10;

function $(id) { return document.getElementById(id); }
function db() { return window.MagDB; }
function publicUrl(path) {
  return (db()?.storageBaseUrl || '') + path;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function checkAccess() {
  if (!db() || !db().isReady()) {
    document.body.innerHTML = '<div class="gate"><h2>인증 모듈을 불러오지 못했습니다</h2><p>새로고침 후에도 반복되면 Supabase 설정을 확인해 주세요.</p></div>';
    return false;
  }
  const session = await db().auth.getSession();
  if (!session) { showGate(); return false; }
  STATE.user = session.user;

  const profile = await db().profiles.getMine();
  if (!profile?.is_editor) {
    showGate('편집부 권한이 있는 계정으로 로그인해야 검토 큐를 볼 수 있어요.');
    return false;
  }
  STATE.isEditor = true;
  $('adminUser').innerHTML = `${escapeHtml(profile.display_name || session.user.email || '')} · <button id="logout">로그아웃</button>`;
  $('logout').addEventListener('click', async () => {
    await db().auth.signOut();
    location.reload();
  });
  return true;
}

function showGate(msg) {
  $('gate').hidden = false;
  $('app').hidden = true;
  if (msg) {
    $('gate').querySelector('p').textContent = msg;
    $('gateLogin').style.display = 'none';
  }
  $('gateLogin').addEventListener('click', async () => {
    await db().auth.signInWithGoogle(window.location.href.split('#')[0]);
  });
}

async function loadCounts() {
  const opts = { themeOnly: STATE.themeOnly };
  for (const status of ['pending', 'approved', 'rejected']) {
    const n = await db().review.count(status, opts);
    STATE.counts[status] = n;
    const el = $(`cnt-${status}`);
    if (el) el.textContent = n;
  }
}

async function loadLikes() {
  STATE.likes = await db().review.adminLikeCounts();
}

async function loadList() {
  $('list').innerHTML = '<div class="empty-state">불러오는 중…</div>';
  const pageNav = $('pagination');
  if (pageNav) pageNav.hidden = true;

  // ── 좋아요 순 모드 ── status 안의 모든 row 한 번에 끌어와 정렬 후 클라이언트 페이지네이션
  if (STATE.likeSort) {
    const { data, error } = await db().review.listAll(STATE.status, { themeOnly: STATE.themeOnly });
    if (error) {
      $('list').innerHTML = `<div class="empty-state">검토 큐를 불러오지 못했습니다.<br><small>${escapeHtml(error.message)}</small></div>`;
      return;
    }
    const rows = (data || []).slice().sort((a, b) => {
      const la = STATE.likes.get(String(a.id)) || 0;
      const lb = STATE.likes.get(String(b.id)) || 0;
      if (lb !== la) return lb - la;
      return new Date(b.created_at) - new Date(a.created_at); // 동률은 최신 먼저
    });
    STATE.allRows = rows;
    const totalAll = rows.length;
    const totalPages = Math.max(1, Math.ceil(totalAll / PAGE_SIZE));
    if (STATE.page > totalPages) STATE.page = totalPages;
    if (STATE.page < 1) STATE.page = 1;
    const from = (STATE.page - 1) * PAGE_SIZE;
    const slice = rows.slice(from, from + PAGE_SIZE);
    if (slice.length === 0) {
      const baseMsg = STATE.status === 'pending' ? '대기 중인 사진이 없습니다.'
                    : STATE.status === 'approved' ? '승인된 사진이 없습니다.'
                    : '반려된 사진이 없습니다.';
      const msg = STATE.themeOnly ? `테마 응모 중 ${baseMsg}` : baseMsg;
      $('list').innerHTML = `<div class="empty-state">${escapeHtml(msg)}</div>`;
      return;
    }
    STATE.rows = slice;
    $('list').innerHTML = slice.map(renderCard).join('');
    bindCardActions();
    renderPagination(totalAll, totalPages);
    return;
  }

  // ── 기본 모드 (서버 페이지네이션, 시간순) ──
  const total = STATE.counts[STATE.status] || 0;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (STATE.page > totalPages) STATE.page = totalPages;
  if (STATE.page < 1) STATE.page = 1;
  const from = (STATE.page - 1) * PAGE_SIZE;
  const to   = from + PAGE_SIZE - 1;

  const { data, error } = await db().review.list(STATE.status, from, to, { themeOnly: STATE.themeOnly });

  if (error) {
    $('list').innerHTML = `<div class="empty-state">검토 큐를 불러오지 못했습니다. 새로고침 후에도 반복되면 DB 권한을 확인해 주세요.<br><small>${escapeHtml(error.message)}</small></div>`;
    return;
  }
  STATE.rows = data || [];
  if (STATE.rows.length === 0) {
    const baseMsg = STATE.status === 'pending' ? '검토 대기 중인 사진이 없습니다. 새 제출이 들어오면 이곳에 표시됩니다.'
                  : STATE.status === 'approved' ? '아직 승인된 사진이 없습니다. 승인된 사진은 독자 사진 영역에 공개됩니다.'
                  : '반려된 사진이 없습니다. 반려 처리한 제출만 이곳에 모입니다.';
    const msg = STATE.themeOnly ? `테마 응모 중 ${baseMsg}` : baseMsg;
    $('list').innerHTML = `<div class="empty-state">${escapeHtml(msg)}</div>`;
    return;
  }
  $('list').innerHTML = STATE.rows.map(renderCard).join('');
  bindCardActions();
  renderPagination(total, totalPages);
}

function renderPagination(total, totalPages) {
  const nav = $('pagination');
  if (!nav) return;
  if (totalPages <= 1) { nav.hidden = true; nav.innerHTML = ''; return; }
  const cur = STATE.page;
  const btn = (label, page, opts = {}) => {
    const disabled = opts.disabled ? ' disabled' : '';
    const active   = opts.active ? ' is-active' : '';
    return `<button type="button" class="admin-page${active}" data-page="${page}"${disabled} aria-label="${escapeHtml(opts.aria || label)}">${escapeHtml(label)}</button>`;
  };
  // 페이지 윈도우 (cur 주변 ±2)
  const pages = [];
  const start = Math.max(1, cur - 2);
  const end   = Math.min(totalPages, cur + 2);
  for (let p = start; p <= end; p++) pages.push(p);
  let html = btn('‹', cur - 1, { disabled: cur === 1, aria: '이전 페이지' });
  if (start > 1) {
    html += btn('1', 1);
    if (start > 2) html += `<span class="admin-page-gap">…</span>`;
  }
  for (const p of pages) html += btn(String(p), p, { active: p === cur });
  if (end < totalPages) {
    if (end < totalPages - 1) html += `<span class="admin-page-gap">…</span>`;
    html += btn(String(totalPages), totalPages);
  }
  html += btn('›', cur + 1, { disabled: cur === totalPages, aria: '다음 페이지' });
  html += `<span class="admin-page-info">총 ${total}건 · ${cur} / ${totalPages}페이지</span>`;
  nav.innerHTML = html;
  nav.hidden = false;
  nav.querySelectorAll('.admin-page').forEach(b => {
    b.addEventListener('click', () => {
      const p = Number(b.dataset.page);
      if (!Number.isFinite(p) || b.disabled || p === cur) return;
      STATE.page = p;
      loadList();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

function getFilmMatchHint(filmText) {
  if (!filmText || typeof window.findFilmMatch !== 'function') return '';
  const match = window.findFilmMatch(filmText, STATE.films);
  if (!match) {
    return `<div class="film-match film-match-new">라이브러리에 아직 없는 필름입니다. 승인 전 정확한 표기로 직접 수정해 주세요.</div>`;
  }
  const normalize = window.normalizeFilmName;
  if (match.type === 'exact') {
    if (normalize(filmText) === normalize(match.canonical) && filmText.trim() === match.canonical) {
      return ''; // 이미 정식 표기 그대로 — 표시 안 함
    }
    return `<div class="film-match film-match-exact">
      정식 표기: <strong>${escapeHtml(match.canonical)}</strong>
      <button class="film-match-apply" data-action="apply-film" data-canonical="${escapeHtml(match.canonical)}">이 이름으로 저장</button>
    </div>`;
  }
  // fuzzy
  return `<div class="film-match film-match-fuzzy">
    추천: <strong>${escapeHtml(match.canonical)}</strong>
    <button class="film-match-apply" data-action="apply-film" data-canonical="${escapeHtml(match.canonical)}">이 필름으로 정정</button>
  </div>`;
}

function renderCard(r) {
  const url = publicUrl(r.storage_path);
  const igNorm = (r.instagram || '').replace(/^@/, '');
  const igUrl = igNorm ? `https://instagram.com/${igNorm}` : null;
  const themeBadge = r.theme_month ? `<span class="sub-card-status pending" style="margin-left:8px; background:#e0e7ff; color:#3730a3;">테마 ${r.theme_month}</span>` : '';
  const likeCount = STATE.likes.get(String(r.id)) || 0;
  const likeBadge = likeCount > 0
    ? `<span class="sub-card-likes" title="이 사진에 ♡ 누른 사용자 수">♡ ${likeCount}</span>`
    : '';
  const filmMatchHint = getFilmMatchHint(r.film);

  return `
    <div class="sub-card" data-id="${r.id}" data-path="${escapeHtml(r.storage_path)}">
      <div class="sub-card-img" data-zoom="${escapeHtml(url)}">
        <img src="${escapeHtml(url)}" alt="" loading="lazy" />
      </div>
      <div class="sub-card-meta">
        <div>
          <span class="sub-card-status ${escapeHtml(r.status)}">${escapeHtml(r.status)}</span>
          ${themeBadge}
          ${likeBadge}
        </div>
        <div class="sub-card-row">
          <span class="k">제출</span>
          <span class="v">${fmtDate(r.created_at)}</span>
        </div>
        ${r.submitter_name ? `
        <div class="sub-card-row">
          <span class="k">이름</span>
          <span class="v">${escapeHtml(r.submitter_name)}</span>
        </div>` : ''}
        <div class="sub-card-row">
          <span class="k">인스타</span>
          <span class="v">${igUrl ? `<a href="${escapeHtml(igUrl)}" target="_blank" rel="noopener">${escapeHtml(r.instagram)}</a>` : escapeHtml(r.instagram || '-')}</span>
        </div>
        <div class="sub-card-row">
          <span class="k">필름</span>
          <span class="v">
            <span class="film-current">${escapeHtml(r.film || '-')}</span>
            <button class="film-edit-btn" data-action="edit-film" data-film="${escapeHtml(r.film || '')}">직접 수정</button>
            ${filmMatchHint}
          </span>
        </div>
        ${r.camera ? `
        <div class="sub-card-row">
          <span class="k">카메라</span>
          <span class="v">${escapeHtml(r.camera)}</span>
        </div>` : ''}
        ${r.caption ? `
        <div class="sub-card-row">
          <span class="k">메모</span>
          <span class="v">${escapeHtml(r.caption)}</span>
        </div>` : ''}
        ${r.rejection_reason ? `
        <div class="sub-card-row">
          <span class="k">반려 사유</span>
          <span class="v">${escapeHtml(r.rejection_reason)}</span>
        </div>` : ''}
        <div class="sub-card-actions">
          ${STATE.status === 'pending' ? `
            <button type="button" class="sub-btn sub-btn-approve" data-action="approve">승인</button>
            <button type="button" class="sub-btn sub-btn-reject" data-action="reject">반려</button>
          ` : ''}
          ${STATE.status === 'rejected' ? `
            <button type="button" class="sub-btn sub-btn-approve" data-action="approve">승인으로 변경</button>
          ` : ''}
          ${STATE.status === 'approved' ? `
            <button type="button" class="sub-btn sub-btn-reject" data-action="reject">반려로 되돌리기</button>
          ` : ''}
          <button type="button" class="sub-btn sub-btn-delete" data-action="delete">완전 삭제</button>
        </div>
      </div>
    </div>`;
}

function bindCardActions() {
  document.querySelectorAll('.sub-card').forEach(card => {
    const id = card.dataset.id;
    const path = card.dataset.path;

    card.querySelector('[data-zoom]')?.addEventListener('click', (e) => {
      const url = e.currentTarget.dataset.zoom;
      $('imgZoomTarget').src = url;
      $('imgZoom').classList.add('open');
    });

    card.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const action = btn.dataset.action;
        if (action === 'apply-film') {
          const canonical = btn.dataset.canonical || '';
          if (!canonical) return;
          btn.disabled = true;
          const { error } = await db().review.patch(id, { film: canonical });
          if (error) { window.notify?.('필름 표기를 저장하지 못했어요. 잠시 뒤 다시 시도해 주세요. (' + error.message + ')'); btn.disabled = false; return; }
          await loadList();
        } else if (action === 'edit-film') {
          const current = btn.dataset.film || '';
          const v = prompt('필름 표기를 직접 수정합니다.\n(예: Kodak Portra 400)', current);
          if (v === null) return;
          const trimmed = String(v).trim();
          if (!trimmed) { window.notify?.('필름 표기는 비워둘 수 없습니다. 정확한 필름명을 입력해 주세요.'); return; }
          if (trimmed === current) return;
          btn.disabled = true;
          const { error } = await db().review.patch(id, { film: trimmed });
          if (error) { window.notify?.('필름 표기를 수정하지 못했어요. 잠시 뒤 다시 시도해 주세요. (' + error.message + ')'); btn.disabled = false; return; }
          await loadList();
        } else if (action === 'approve') {
          btn.disabled = true; btn.textContent = '처리 중…';
          const { error } = await db().review.patch(id, {
            status: 'approved', rejection_reason: null,
            reviewed_at: new Date().toISOString(), reviewed_by: STATE.user.id,
          });
          if (error) { window.notify?.('승인 처리에 실패했어요. 권한과 네트워크 상태를 확인해 주세요. (' + error.message + ')'); btn.disabled = false; btn.textContent = '승인'; return; }
          await Promise.all([loadCounts(), loadList()]);
        } else if (action === 'reject') {
          const reason = prompt('반려 사유를 입력하세요. 사용자가 내 정보에서 확인할 수 있습니다. (선택)', '');
          if (reason === null) return;
          btn.disabled = true; btn.textContent = '처리 중…';
          const { error } = await db().review.patch(id, {
            status: 'rejected', rejection_reason: reason || null,
            reviewed_at: new Date().toISOString(), reviewed_by: STATE.user.id,
          });
          if (error) { window.notify?.('반려 처리에 실패했어요. 권한과 네트워크 상태를 확인해 주세요. (' + error.message + ')'); btn.disabled = false; btn.textContent = '반려'; return; }
          await Promise.all([loadCounts(), loadList()]);
        } else if (action === 'delete') {
          if (!confirm('이 제출을 완전히 삭제할까요? 사진 파일과 DB 기록이 모두 지워져 복구할 수 없습니다.')) return;
          btn.disabled = true; btn.textContent = '삭제 중…';
          const { error: dbErr } = await db().review.remove(id);
          if (dbErr) { window.notify?.('DB 기록을 삭제하지 못했어요. Storage 파일은 건드리지 않았습니다. (' + dbErr.message + ')'); btn.disabled = false; btn.textContent = '완전 삭제'; return; }
          if (path) await db().submissions.removePhoto(path);
          await Promise.all([loadCounts(), loadList()]);
        }
      });
    });
  });
}

document.querySelectorAll('.admin-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    STATE.status = tab.dataset.status;
    STATE.page = 1;
    loadList();
  });
});

$('themeFilter').addEventListener('click', async () => {
  STATE.themeOnly = !STATE.themeOnly;
  STATE.page = 1;
  const chip = $('themeFilter');
  chip.classList.toggle('is-active', STATE.themeOnly);
  chip.setAttribute('aria-pressed', String(STATE.themeOnly));
  // count 도 filter 반영해서 다시 — 상태탭의 ·숫자 가 같이 변함
  await Promise.all([loadCounts(), loadList()]);
});

$('likeSort').addEventListener('click', async () => {
  STATE.likeSort = !STATE.likeSort;
  STATE.page = 1;
  const chip = $('likeSort');
  chip.classList.toggle('is-active', STATE.likeSort);
  chip.setAttribute('aria-pressed', String(STATE.likeSort));
  // 좋아요 카운트는 최신화 — 토글 켤 때마다 다시 fetch
  if (STATE.likeSort) await loadLikes();
  await loadList();
});

$('imgZoom').addEventListener('click', () => {
  $('imgZoom').classList.remove('open');
  $('imgZoomTarget').src = '';
});

async function loadFilms() {
  try {
    // Supabase 우선 (admin/films 변경 즉시 반영), fallback 정적 JSON
    if (window.MagDB && window.MagDB.isReady()) {
      STATE.films = await window.MagDB.films.listAsObject();
      if (STATE.films && Object.keys(STATE.films).length) return;
    }
    const r = await fetch('../data/films.json', { cache: 'no-cache' });
    if (!r.ok) return;
    STATE.films = await r.json();
  } catch (_) {}
}

async function loadReportBadge() {
  try {
    const n = await db().market.adminReportCount('pending');
    const el = $('reportBadge');
    if (!el) return;
    if (n > 0) { el.textContent = n; el.hidden = false; }
    else { el.hidden = true; }
  } catch (_) {}
}

(async function main() {
  for (let i = 0; i < 50; i++) {
    if (db() && db().isReady()) break;
    await new Promise(r => setTimeout(r, 50));
  }
  for (let i = 0; i < 20; i++) {
    if (typeof window.findFilmMatch === 'function') break;
    await new Promise(r => setTimeout(r, 25));
  }
  const ok = await checkAccess();
  if (!ok) return;
  $('gate').hidden = true;
  $('app').hidden = false;
  // 필름 카탈로그를 먼저 로드 — getFilmMatchHint 가 STATE.films 에 의존
  // (loadList 가 먼저 끝나면 모든 카드에 "라이브러리에 없는 필름" 으로 잘못 표시됨)
  await loadFilms();
  await Promise.all([loadCounts(), loadLikes(), loadList(), loadReportBadge()]);
})();
</script>
