# Supabase Storage 의 public 버킷 이미지 프록시.
# 같은 사진을 100명이 봐도 Netlify edge 캐시가 답해 Supabase egress 가 폭증하지
# 않게 한다. /i/reader/<path> → reader-submissions, /i/market/<path> →
# market-listings. 캐시 헤더는 아래 [[headers]] for = "/i/*" 에서 강제.
[[redirects]]
  from = "/i/reader/*"
  to = "https://pucpqsfwqouqohwsvmnd.supabase.co/storage/v1/object/public/reader-submissions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/i/market/*"
  to = "https://pucpqsfwqouqohwsvmnd.supabase.co/storage/v1/object/public/market-listings/:splat"
  status = 200
  force = true

# 기본 보안 헤더 — 정적 사이트 + Supabase 댓글/투고 폼 + Labs 지도 기준
# NOTE: script-src 의 'unsafe-inline' 은 기사 JSON-LD와 일부 레거시 페이지 스크립트가 남아 있어
#       당장 제거하기 어려움. 실행성 공통 스크립트는 점진적으로 js/ 외부 파일로 이동 중.
#       그동안 동적 innerHTML 삽입은 모두 escapeHtml/escapeAttr 로 가드함 (XSS 1차 차단).
#       script-src-attr 'none' 으로 inline event handler 는 차단하고, 실제 사용하는 외부 실행/통신
#       도메인만 명시한다. img-src 는 기사 외부 출처와 Naver 지도 타일 때문에 아직 https: 를 유지.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://oapi.map.naver.com https://nrbe.pstatic.net https://map.pstatic.net https://plausible.io https://js.sentry-cdn.com; script-src-attr 'none'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; font-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self' https://pucpqsfwqouqohwsvmnd.supabase.co wss://pucpqsfwqouqohwsvmnd.supabase.co https://oapi.map.naver.com https://naveropenapi.apigw.ntruss.com https://maps.apigw.ntruss.com https://nrbe.map.naver.com https://map.pstatic.net https://simg.pstatic.net https://ssl.pstatic.net https://kr-col-ext.nelo.navercorp.com https://api.github.com https://plausible.io https://*.ingest.sentry.io; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; worker-src 'self' blob:; manifest-src 'self'; media-src 'self' data: blob:; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"

# 빌드 후 캐시 헤더 — 정적 자산 장기 캐시
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Supabase Storage 프록시 응답 — 사진 파일은 path 자체가 unique (user_id + uuid)
# 라 immutable. Netlify edge 가 1년 캐싱, 브라우저도 1년. 두 번째 viewer 부터
# Supabase 까지 안 가고 Netlify edge 에서 끝.
[[headers]]
  for = "/i/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, s-maxage=31536000, immutable"
