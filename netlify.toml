[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# 기본 보안 헤더 — 정적 사이트 + Supabase 댓글/투고 폼 기준
# NOTE: script-src 의 'unsafe-inline' 은 기사 JSON-LD와 일부 레거시 페이지 스크립트가 남아 있어
#       당장 제거하기 어려움. 실행성 공통 스크립트는 점진적으로 js/ 외부 파일로 이동 중.
#       그동안 동적 innerHTML 삽입은 모두 escapeHtml/escapeAttr 로 가드함 (XSS 1차 차단).
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://pucpqsfwqouqohwsvmnd.supabase.co wss://pucpqsfwqouqohwsvmnd.supabase.co; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; worker-src 'self' blob:; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"

# 빌드 후 캐시 헤더 — 정적 자산 장기 캐시
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
