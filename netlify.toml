[build]
  command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/films"
  to = "/films.html"
  status = 200

# Webzine 페이지가 Books 로 이름 변경. 옛 URL 로 들어오는 외부 링크·검색 결과를 308 로 영구 이전.
[[redirects]]
  from = "/webzine.html"
  to = "/books.html"
  status = 301
  force = true

[[redirects]]
  from = "/webzine"
  to = "/books.html"
  status = 301
  force = true

# 카카오/인앱 브라우저가 예전 HTML 캐시를 들고 /film/:slug 같은 짧은 URL에서
# 상대 asset 경로를 요청해도 CSS/JS/이미지가 깨지지 않도록 루트 asset으로 보정한다.
[[redirects]]
  from = "/film/css/:splat"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "/film/js/:splat"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "/film/img/:splat"
  to = "/img/:splat"
  status = 200

[[redirects]]
  from = "/film/data/:splat"
  to = "/data/:splat"
  status = 200

[[redirects]]
  from = "/film/pretendard.css"
  to = "/pretendard.css"
  status = 200

[[redirects]]
  # /film/<slug> → 정적 OG stub (build-film-og.mjs 가 생성).
  # stub 이 meta refresh + JS 로 즉시 films.html?film=<slug> 으로 이동시킴.
  # 소셜 미리보기(카카오/페이스북/트위터)가 stub 의 og:image 를 보게 됨.
  # 빌드 누락된 신규 slug 도 대비해 force=false (정적 파일 우선).
  from = "/film/:slug"
  to = "/film/:slug.html"
  status = 200

