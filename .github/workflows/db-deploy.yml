name: Supabase Migrations

# main 머지 시 supabase/migrations/*.sql 변경이 있으면 자동 적용.
# 필요한 시크릿 (GitHub Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN  — supabase CLI 로그인 토큰 (https://supabase.com/dashboard/account/tokens)
#   SUPABASE_DB_PASSWORD   — DB 비밀번호 (Settings → Database → Connection Password)
#
# 프로젝트 ref(pucpqsfwqouqohwsvmnd) 는 공개정보(사이트 JS 에 노출) 라 워크플로우에 직접 박음.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/db-deploy.yml'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: pucpqsfwqouqohwsvmnd

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --include-all
