name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci || npm install
      - name: 자산 참조 검증
        run: npm run validate
      - name: Playwright 의존성
        run: npx playwright install --with-deps chromium
      - name: 스모크 테스트
        run: npm test
