<script>
(async function () {
  const out = document.getElementById('unsubResult');
  const setHtml = (html) => { out.innerHTML = html; };

  const token = (new URLSearchParams(location.search).get('token') || '').trim();
  if (!token) {
    setHtml('<p>이 페이지는 5ft magazine 의 새 이슈 안내 메일에 포함된 해지 링크로 들어올 수 있어요. 링크가 보이지 않으면 <a href="mailto:hello@5ftmag.com">hello@5ftmag.com</a> 으로 알려주세요.</p>');
    return;
  }

  // db-client 초기화 대기 (최대 5초)
  let waited = 0;
  while ((!window.MagDB || !window.MagDB.isReady()) && waited < 5000) {
    await new Promise((r) => setTimeout(r, 100));
    waited += 100;
  }
  if (!window.MagDB || !window.MagDB.isReady()) {
    setHtml('<p>네트워크가 불안정해요. 잠시 후 다시 시도해 주세요.</p>');
    return;
  }

  setHtml('<p>해지 처리 중…</p>');
  const res = await window.MagDB.newsletter.unsubscribe(token);
  if (res && res.ok) {
    setHtml('<p><strong>구독이 해지됐어요.</strong> 다시 돌아오시는 날이 있으면 좋겠어요.</p>');
    return;
  }
  if (res && res.error && res.error.message === 'invalid token') {
    setHtml('<p>이 링크는 형식이 맞지 않아요. 메일에 포함된 가장 최근 해지 링크를 다시 확인해 주세요.</p>');
    return;
  }
  setHtml('<p>이미 해지된 링크이거나 처리에 실패했어요. 계속 같은 화면이면 <a href="mailto:hello@5ftmag.com">hello@5ftmag.com</a> 으로 알려주세요.</p>');
})();
</script>
