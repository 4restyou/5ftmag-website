<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>알림 진단 — 5ft.mag</title>
  <link rel="stylesheet" href="./pretendard.css" />
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/common.css?v=20260516-iconanim">
  <style>
    body { padding: 24px; font-family: var(--font); background: var(--bg); color: var(--text); }
    h1 { font-size: 22px; margin-bottom: 16px; }
    .status { padding: 12px; background: var(--bg-sub); border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
    pre {
      background: var(--bg-sub); padding: 16px; border-radius: 6px; font-size: 13px;
      line-height: 1.55; overflow-x: auto; white-space: pre-wrap; word-break: break-all;
    }
    .key { font-weight: bold; color: var(--text); }
    .row { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: baseline; }
    .row:last-child { border-bottom: none; }
    .row b { min-width: 180px; font-size: 13px; }
    .row span { font-size: 14px; word-break: break-all; }
    .verdict { padding: 16px; border-radius: 6px; margin-top: 16px; font-weight: 600; }
    .verdict.ok { background: #d1fae5; color: #064e3b; }
    .verdict.bad { background: #fee2e2; color: #7f1d1d; }
  </style>
</head>
<body>

<h1>알림 진단</h1>
<div class="status" id="status">불러오는 중…</div>
<div id="result"></div>
<div id="verdict"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./js/db-client.js?v=20260518-region"></script>
<script>
(async function() {
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  const verdict = document.getElementById('verdict');

  // db ready
  for (let i = 0; i < 60; i++) {
    if (window.MagDB && window.MagDB.isReady()) break;
    await new Promise(r => setTimeout(r, 50));
  }
  if (!window.MagDB || !window.MagDB.isReady()) {
    status.textContent = '클라이언트 준비 실패';
    return;
  }
  const session = await MagDB.auth.getSession();
  if (!session) {
    status.textContent = '로그인이 필요합니다. /me.html 에서 로그인 후 다시 이 페이지를 새로고침해주세요.';
    return;
  }
  status.textContent = '로그인 OK · user_id = ' + session.user.id;

  // RPC 호출
  const data = await MagDB.notifications.debugStatus();
  if (!data || data.error) {
    result.innerHTML = '<pre>RPC 호출 실패: ' + JSON.stringify(data) + '</pre>';
    return;
  }

  // 정리해서 표시
  const rows = [
    ['auth_uid', data.auth_uid],
    ['profile.is_editor', data.profile ? data.profile.is_editor : '(no profile row)'],
    ['profile.display_name', data.profile ? data.profile.display_name : '-'],
    ['editor_count (전체 편집부 수)', data.editor_count],
    ['my_notification_count (내 알림 총수)', data.my_notification_count],
    ['my_unread_count (내 미확인 수)', data.my_unread_count],
    ['my_recent_titles (최근 5개 제목)', JSON.stringify(data.my_recent_titles)],
    ['trigger_editors_new_submission_exists', data.trigger_editors_new_submission_exists],
  ];
  result.innerHTML = rows.map(([k, v]) => `<div class="row"><b>${k}</b><span>${v}</span></div>`).join('');

  // 결론
  let v = '';
  if (!data.profile) {
    v = '<div class="verdict bad">profiles 행이 없습니다. 로그인 계정에 profiles row가 생성되지 않은 상태.</div>';
  } else if (!data.profile.is_editor) {
    v = '<div class="verdict bad">profile.is_editor 가 FALSE 입니다. 편집부 계정이 아닌 상태로 로그인했거나, profiles.is_editor 가 TRUE 로 안 박혀 있음.</div>';
  } else if (data.editor_count === 0) {
    v = '<div class="verdict bad">editor_count = 0. 트리거가 편집부를 못 찾음.</div>';
  } else if (data.my_notification_count === 0) {
    v = '<div class="verdict bad">알림이 INSERT 되지 않았음. 트리거/INSERT 경로 문제.</div>';
  } else if (data.my_unread_count > 0) {
    v = '<div class="verdict ok">알림은 INSERT 되어 있음. 종에 안 보이면 표시(SELECT/realtime/캐싱) 문제.</div>';
  } else {
    v = '<div class="verdict ok">알림은 있지만 모두 읽음 상태.</div>';
  }
  verdict.innerHTML = v;
})();
</script>

</body>
</html>
